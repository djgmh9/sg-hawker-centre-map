<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Singapore Hawker Centre Map</title>
    <meta
      name="description"
      content="Interactive Singapore Hawker Centre map with live search powered by data.gov.sg"
    />
    <link rel="icon" href="data:," />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <p class="eyebrow">Singapore Atlas</p>
        <h1>Hawker Centre Interactive Map</h1>
        <p class="subtext">
          Explore hawker centres by name or postal code, powered by data.gov.sg.
        </p>
      </header>

      <section class="controls" aria-label="Search and status panel">
        <label for="searchInput">Search hawker centre</label>
        <input
          id="searchInput"
          type="search"
          placeholder="Try: Tiong Bahru or 168898"
          autocomplete="off"
        />
        <p id="statusMessage" aria-live="polite">Loading hawker centres...</p>
      </section>

      <main class="map-wrap">
        <div id="map" role="region" aria-label="Singapore Hawker Centre map"></div>
        <aside
          id="detailsPanel"
          class="details-panel"
          aria-live="polite"
          aria-label="Selected hawker centre details"
        ></aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
